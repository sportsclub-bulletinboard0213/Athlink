<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
 <title>スポーツクラブ掲示板 | 小学生・中学生のクラブチーム募集 | ClubLink</title>
  
 <meta name="description" content="小学生・中学生向けスポーツクラブやクラブチームの募集掲示板。サッカー・野球・バスケ・陸上など地域のスポーツチームを検索できます。ClubLinkで自分に合うクラブを見つけよう。">
  
  <link rel="stylesheet" href="design.css">
  
  <meta name="google-site-verification" content="QSUNHB4k5gbhgY4tVjbleuQWU1WLdPswY-idBi8P3kc" />
<link rel="canonical" href="https://sportsclub-bulletinboard0213.github.io/Athlink/">
</head>

<body>
 <div class="hero">
  <div class="logo">ClubLink</div>
  <div class="logo-2">スポーツクラブ掲示板</div>
  <h1 class="title-h1">スポーツクラブ掲示板</h1>
  <p class="title-h2">これは小・中学生のクラブ活動を募集する掲示板です</p>
</div>
<div id="imageModal" class="modal" onclick="closeModal()">
  <span class="close">&times;</span>
  <img class="modal-content" id="expandedImg">
</div>


<a href="post.html" class="title-button" target="_blank">投稿する</a>
<div class="sport-menu">

<button onclick="filterSport(event,'')">すべて</button>
<button onclick="filterSport(event,'サッカー')">サッカー</button>
<button onclick="filterSport(event,'野球')">野球</button>
<button onclick="filterSport(event,'バスケ')">バスケ</button>
<button onclick="filterSport(event,'バレー')">バレー</button>
<button onclick="filterSport(event,'陸上')">陸上</button>
<button onclick="filterSport(event,'バドミントン')">バドミントン</button>
<button onclick="filterSport(event,'テニス')">テニス</button>
<button onclick="filterSport(event,'その他')">その他</button>
</div>
 <!-- 地域検索フィルター -->
  <div class="keyword-menu">

<input type="text" id="keyword" placeholder="例：東京  小学生 社会人 無料 などキーワードで検索">

<button onclick="searchKeyword()">検索</button>

</div>

<label>並び替え:</label>

<select id="sortSelect" onchange="changeSort()">
<option value="new">新着順</option>
<option value="old">古い順</option>
<option value="members_desc">人数多い順</option>
<option value="members_asc">人数少ない順</option>

</select>

</div>








<div id="posts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const { createClient } = supabase;


const client = createClient(
  "https://tdfnajalmkfetndtsivo.supabase.co",
  "sb_publishable_6CpkprXrX-rd7F1Yx6O21g_krBbL5-T"
);

// 拡大表示用の関数（関数の外に出しておきます）
function openModal(src) {
  document.getElementById("imageModal").style.display = "flex";
  document.getElementById("expandedImg").src = src;
}

function closeModal() {
  document.getElementById("imageModal").style.display = "none";
}

async function loadPosts(sport = "", region = "", keyword = "") {
  let query = client
    .from("teams")
    .select("*")
    .eq("approved", true)
    if(currentSort == "new"){
query = query.order("id", { ascending:false });
}

if(currentSort == "old"){
query = query.order("id", { ascending:true });
}

if(currentSort == "members_desc"){
query = query.order("members", { ascending:false });
}

if(currentSort == "members_asc"){
query = query.order("members", { ascending:true });
}

  if (sport != "") {
    query = query.eq("sport", sport);
  }

  if (region != "") {
    query = query.ilike("location", `%${region.trim()}%`);
  }
  if(keyword != ""){

const words = keyword.split(" ");

words.forEach(word => {

if(word == "無料"){
query = query.eq("fee",0);
}

else if(!isNaN(word)){
query = query.eq("fee",word);
}

else{

query = query.or(
`team_name.ilike.%${word}%,
location.ilike.%${word}%,
sport.ilike.%${word}%,
target.ilike.%${word}%`
);

}

});

}

 if(currentSort == "fee_asc"){
query = query.order("fee",{ascending:true});
}

if(currentSort == "fee_desc"){
query = query.order("fee",{ascending:false});
}

const { data, error } = await query;

 const postArea = document.getElementById("posts");
postArea.innerHTML = "";

let html = "";

data.forEach(post => {

html += `
<div class="team-card"> 
  <table class="team-table-top">
   <tr>
<th colspan="2" class="team-title">
<a href="team.html?id=${post.id}">
${post.team_name}
</a>
</th>
</tr>
      <td class="team-img-cell">
        <img src="${post.image_url}" class="team-img" onclick="openModal('${post.image_url}')">
      </td>
      <td class="team-info-cell">${post.pr}</td>
    </tr>
  </table>

  <div class="horizontal-scroll-wrapper">
    <div class="info-item"><strong>活動場所</strong><br>${post.location}</div>
    <div class="info-item"><strong>活動時間</strong><br>${post.time}</div>
    <div class="info-item"><strong>実績</strong><br>${post.achievements}</div>
   <div class="info-item"><strong>チーム人数</strong><br>${post.members}人</div>
    <div class="info-item"><strong>対象</strong><br>${post.target}</div>
    <div class="info-item"><strong>競技名</strong><br>${post.sport}</div>
    <div class="info-item"><strong>料金</strong><br>${post.fee}</div>
    <div class="info-item"><strong>連絡先</strong><br>${post.contact}</div>
    <div class="info-item"><strong>SNS</strong><br>
      <a href="${post.sns}" target="_blank" rel="noopener noreferrer">リンク</a>
    </div>
  </div>

</div>
`;

});

postArea.innerHTML = html;
}

// フィルタリング用関数
function filterRegion() {
  const region = document.getElementById("regionFilter").value;
   const activeSportBtn = document.querySelector(".sport-menu button.active"); 
   const sport = activeSportBtn ? activeSportBtn.textContent : "";
  loadPosts(sport, region);
}

  
function searchKeyword(){

const keyword = document.getElementById("keyword").value;
const region = document.getElementById("regionFilter").value;

loadPosts("", region, keyword);

}

function filterSport(event, sport) {
  const region = document.getElementById("regionFilter").value;
  loadPosts(sport, region);

  const buttons = document.querySelectorAll(".sport-menu button");
  buttons.forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
}

let currentSort = "new";

function changeSort(){

const sort = document.getElementById("sortSelect").value;
currentSort = sort;
loadPosts();

}

// 初期表示
loadPosts();

</script>

</body>
</html>
