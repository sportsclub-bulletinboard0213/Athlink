<htm1>
  <head>
    <meta charset="UTF-8">
    <title>クラブ活動掲示板</title>
    <style>
     input, textarea{
        height: 30px;
        padding: 5px;
        box-sizing: border-box;
        vertical-align: middle;

      }
    </style>
   
    </head>
    <body>
      <form id="form">
<h1>クラブ活動掲示板</h1>
<P>これは小・中学生のクラブ活動を募集する掲示板です</P>
      </form>
      <h2>ログイン</h2>

<input id="username" placeholder="ユーザー名">
<input id="password" type="password" placeholder="パスワード">

<button onclick="login()">ログイン</button>

<p id="msg"></p>

      


</body>
</htm1>

<input id ="name" placeholder="チーム名">
<input id ="message" placeholder="活動場所">
<input id ="time" placeholder="活動時間">
<input id ="member" placeholder="所属人数">
<textarea id ="achievement" placeholder="実績"></textarea> </textarea>
<textarea id ="url" placeholder="チームサイト"></textarea> </textarea>

<button type="button" onclick="addpost()">投稿</button>

<table border="1">
    <tr>
      <th>チーム名</th>
      <th>活動場所</th>
      <th>活動時間</th>
       <th>人数</th>
       <th>実績</th>
       <th>チームサイト</th>
      
     
    </tr>
     <tbody id="posts"></tbody>
   </table>




<script>
  function addpost(){let name=document.getElementById("name").value;
  let message=document.getElementById("message").value;
  let time=document.getElementById("time").value;
  let member=document.getElementById("member").value;
  let achievement=document.getElementById("achievement").value;
  let url=document.getElementById("url").value;
  let posts = document.getElementById("posts");
posts.innerHTML +=
  "<tr>" +
  "<td>" + name +  + "</td>" +
  "<td>" + message + "</td>" +
  "<td>" + time + "</td>" +
  "<td>" + member + "</td>" +
  "<td>" + achievement + "</td>" +
  "<td>" + url + "</td>" +  
  "</tr>";
  }



  
  
</script>
